<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#fff"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Restart"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon-192.png"><title>Restart｜重新開始</title><style>
:root{--bg:#f5f6f7;--card:#fff;--text:#202522;--muted:#77807c;--line:#e6e9e7;--primary:#ef7b5d;--good:#2f9b70;--warn:#d89a2b;--bad:#d6535d;--blue:#3178d5;--shadow:0 10px 28px rgba(22,32,27,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif}.app{max-width:760px;margin:auto;padding:18px 16px 110px}.page{display:none}.page.active{display:block}.title{font-size:28px;font-weight:900;margin:8px 0 18px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:17px;box-shadow:var(--shadow);margin-bottom:14px}.summary3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.summary3 .card{margin:0;padding:14px}.summary3 small,.muted{color:var(--muted)}.summary3 strong{display:block;font-size:20px;margin-top:6px}.btn{border:0;border-radius:15px;padding:13px 15px;font-weight:850}.wide{width:100%}.primary{background:var(--primary);color:#fff}.ghost{background:#fff;border:1px solid var(--line)}.danger{background:#fff;border:1px solid #efa0a8;color:var(--bad)}.sos{background:linear-gradient(135deg,#ef7b5d,#ffa538);color:#fff;font-size:18px}.check{font-size:20px;color:var(--blue);font-weight:900}.relapse-note{background:#fff7eb;border-color:#f0c77e;color:#80531d}.tree{text-align:center;padding:26px}.tree .emoji{font-size:90px}.milestones{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:14px}.mile{text-align:center;font-size:12px;color:var(--muted)}.mile i{display:block;width:34px;height:34px;border-radius:50%;border:3px solid #dce2df;margin:auto auto 6px}.mile.done i{border-color:var(--good);background:#e9f6ef}.section-head{display:flex;justify-content:space-between;align-items:center;margin:22px 0 10px}.section-head h2{margin:0;font-size:20px}.section-head button{border:0;background:transparent;color:var(--primary);font-weight:900}.alert-list{display:flex;flex-direction:column;gap:9px}.upcoming-list{display:flex;flex-direction:column;gap:9px}.upcoming-item{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 14px}.upcoming-item .name{font-weight:900}.upcoming-item .date{font-size:12px;color:var(--muted);margin-top:4px}.upcoming-item .amount{text-align:right;font-weight:900}.upcoming-item .days{font-size:12px;color:var(--muted);margin-top:4px}.upcoming-item.urgent{border-color:#efb0b6;background:#fff4f5}.upcoming-item.soon{border-color:#f0cf8f;background:#fffaf0}.alert{border-left:5px solid var(--good);padding:12px 14px;background:#f8fbf9;border-radius:13px}.alert.warn{border-color:var(--warn);background:#fff8ea}.alert.bad{border-color:var(--bad);background:#fff0f1}.item{border:1px solid var(--line);border-radius:17px;padding:14px;margin-bottom:10px}.item-head{display:flex;justify-content:space-between;gap:10px}.item-title{font-weight:900}.item-amount{font-size:21px;font-weight:900;margin-top:4px}.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;font-size:13px;color:var(--muted)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tiny{border:0;border-radius:10px;padding:8px 10px;font-size:12px;font-weight:850}.edit{background:#edf6f1;color:#347e5e}.pay{background:#edf3fc;color:#2f66aa}.delete{background:#fdecef;color:#bd4650}.field{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}.field label{font-size:13px;color:var(--muted);font-weight:800}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px}.form2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.modal{position:fixed;z-index:60;inset:0;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center}.modal.open{display:flex}.sheet{width:min(760px,100%);max-height:92vh;overflow:auto;background:var(--bg);border-radius:28px 28px 0 0;padding:20px 18px calc(24px + env(safe-area-inset-bottom))}.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}.close{border:0;background:#e9ecea;width:38px;height:38px;border-radius:50%}.ledger-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.ledger-summary .card{padding:13px}.transaction{display:grid;grid-template-columns:1fr auto;gap:10px;border-bottom:1px solid var(--line);padding:12px 0}.income{color:var(--good)}.expense{color:var(--bad)}.fab{position:fixed;z-index:25;right:24px;bottom:100px;width:58px;height:58px;border-radius:50%;border:0;background:var(--primary);color:#fff;font-size:28px;box-shadow:var(--shadow);display:none}.nav{position:fixed;z-index:20;left:50%;transform:translateX(-50%);bottom:calc(10px + env(safe-area-inset-bottom));width:min(730px,calc(100% - 20px));display:grid;grid-template-columns:repeat(5,1fr);background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:22px;padding:7px;box-shadow:var(--shadow)}.nav button{border:0;background:transparent;padding:9px 2px;border-radius:14px;color:#777;font-size:11px}.nav button.active{background:#fff1ec;color:#d96044;font-weight:900}.chart-tabs{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.chart-tabs button{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px}.chart-tabs button.active{background:#fff1ec;color:#d96044;border-color:#f3b4a5}.chart{height:240px;border:1px solid var(--line);border-radius:18px;padding:12px;background:#fff}.barrow{display:grid;grid-template-columns:78px 1fr 76px;gap:8px;align-items:center;margin:14px 0;font-size:13px}.bar{height:12px;background:#edf0ee;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,#ef7b5d,#ffa538)}.urge{position:fixed;z-index:100;inset:0;background:#0e1311;color:#fff;display:none;overflow:auto}.urge.open{display:block}.urge-body{max-width:760px;margin:auto;padding:40px 20px}.timer{font-size:64px;font-weight:900;text-align:center}.urge .btn{background:#fff;color:#111;margin-top:10px}.urge .line{background:#38b66b;color:#fff}.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.photo-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:14px}.empty{text-align:center;color:var(--muted);padding:20px;border:1px dashed var(--line);border-radius:16px}@media(max-width:560px){.summary3 strong{font-size:17px}.meta{grid-template-columns:1fr}.form2{grid-template-columns:1fr}.milestones{grid-template-columns:repeat(6,1fr)}}

.home-hero{height:42vh;min-height:320px;max-height:500px;position:relative;background:linear-gradient(135deg,#809e90,#426f5c);overflow:hidden;margin:-18px -16px 0}.home-hero img{width:100%;height:100%;object-fit:cover;display:none}.home-hero.has-photo img{display:block}.home-hero:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.08) 25%,rgba(0,0,0,.7) 100%)}.home-hero-copy{position:absolute;z-index:2;left:24px;right:24px;bottom:28px;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.35)}.home-hero-copy h1{font-size:34px;line-height:1.12;margin:0 0 10px}.home-hero-copy div{font-size:17px;font-weight:700;line-height:1.5}.home-content{padding:18px 0}.home-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:-42px;position:relative;z-index:4}.home-stat{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 10px;text-align:center;box-shadow:var(--shadow)}.home-stat strong{display:block;font-size:22px}.home-stat small{color:var(--muted)}.home-section{margin-top:22px}.home-section .summary3 .box{background:var(--card);border:1px solid var(--line);border-radius:17px;padding:13px}.home-section .summary3 strong{display:block;font-size:17px;margin-top:5px}.home-quick{width:100%;min-height:118px;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:22px;padding:17px;box-shadow:var(--shadow)}.home-quick .emoji{font-size:29px}.home-quick strong{display:block;margin:8px 0 4px;color:var(--blue);font-size:18px}.home-quick span{font-size:12px;color:var(--muted)}.home-relapse{margin-top:10px}.home-tree{margin-top:22px}.home-tree .emoji{font-size:90px}.home-sos{margin-top:16px}.home-snapshot-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.home-snapshot-head h2{font-size:19px;margin:0}.home-snapshot-head button{border:0;background:transparent;color:var(--primary);font-weight:800}@media(max-width:560px){.home-hero{height:39vh;min-height:300px}.home-hero-copy h1{font-size:30px}.home-stat strong{font-size:18px}}
</style></head><body><main class="app">
<section id="home" class="page active">
  <div class="home-hero" id="homeHero">
    <img id="homeHeroImg" alt="重要照片">
    <div class="home-hero-copy"><h1>重新開始</h1><div>今天不賭，因為我值得更好的生活。</div></div>
  </div>
  <div class="home-content">
    <div class="home-stats">
      <div class="home-stat"><strong id="dayCount">0</strong><small>戒賭天數</small></div>
      <div class="home-stat"><strong id="savedTotal">NT$ 0</strong><small>累積省下</small></div>
      <div class="home-stat"><strong id="streakCount">0</strong><small>連續簽到</small></div>
    </div>
    <button class="btn sos wide home-sos" onclick="openUrge()">😣 我現在很想賭</button>
    <div class="home-section">
      <div class="home-snapshot-head"><h2>財務快照</h2><button onclick="showPage('finance')">查看全部</button></div>
      <div class="summary3"><div class="box"><small>總負債</small><strong id="homeDebt">NT$ 0</strong></div><div class="box"><small>可用資產</small><strong id="homeAsset">NT$ 0</strong></div><div class="box"><small>目標進度</small><strong id="homeGoal">0%</strong></div></div>
    </div>
    <div id="relapseNote" class="card relapse-note" style="display:none;margin-top:14px"><b>滑倒了沒關係，重新開始。</b><div>這次不是歸零，而是帶著經驗再走一次。歷史最佳紀錄仍會保留。</div></div>
    <div class="home-section">
      <button class="home-quick" onclick="checkin()"><span class="emoji">✅</span><strong>今天不賭</strong><span id="checkinText">完成今日簽到</span></button>
      <button class="btn danger wide home-relapse" onclick="relapse()">我又復賭了</button>
    </div>
    <div class="card tree home-tree"><div class="muted">成長中的自己</div><div id="treeEmoji" class="emoji">🌰</div><h3 id="treeText">種子正在等待發芽</h3><b style="color:var(--good)">歷史最佳 <span id="bestRecord">0</span> 天</b><div id="milestones" class="milestones"></div></div>
  </div>
</section>
<section id="finance" class="page"><div class="title">財務總覽</div><div class="section-head"><h2>近期需繳款</h2></div><div id="upcomingPayments" class="upcoming-list"></div><div class="section-head"><h2>提醒、風險與建議</h2><button onclick="showPage('analysis')">圖表分析</button></div><div id="riskList" class="alert-list"></div><div class="section-head"><h2>負債狀況</h2><button onclick="openDebt()">＋新增</button></div><div id="debtList"></div><div class="section-head"><h2>資產現況</h2><button onclick="openAsset()">＋新增</button></div><div id="assetList"></div><div class="section-head"><h2>存錢目標</h2><button onclick="openGoal()">＋新增</button></div><div id="goalList"></div></section>
<section id="analysis" class="page"><div class="title">圖表分析</div><div class="chart-tabs"><button class="active" onclick="renderAnalysis('finance',this)">財務結構</button><button onclick="renderAnalysis('ledger',this)">收支趨勢</button><button onclick="renderAnalysis('recovery',this)">戒賭進度</button></div><div id="analysisChart" class="chart"></div><button class="btn ghost wide" style="margin-top:12px" onclick="showPage('finance')">返回財務總覽</button></section>
<section id="ledger" class="page"><div class="title">記帳</div><div class="field"><label>月份</label><input id="ledgerMonth" type="month" onchange="renderLedger()"></div><div class="ledger-summary"><div class="card"><small>收入</small><strong id="monthIncome" class="income">NT$ 0</strong></div><div class="card"><small>支出</small><strong id="monthExpense" class="expense">NT$ 0</strong></div><div class="card"><small>結餘</small><strong id="monthBalance">NT$ 0</strong></div></div><div class="section-head"><h2>明細</h2></div><div class="card" id="transactionList"></div></section>
<section id="journal" class="page"><div class="title">日記</div><div class="card"><div class="field"><label>今天發生什麼？</label><textarea id="journalText"></textarea></div><button class="btn primary wide" onclick="saveJournal()">儲存</button></div><div id="journalList"></div></section>
<section id="more" class="page"><div class="title">更多與設定</div><div class="card"><div class="field"><label>戒賭開始日</label><input id="startDate" type="date"></div><div class="field"><label>我的理由（只會在 SOS 顯示，不放首頁）</label><textarea id="reasonText"></textarea></div><div class="field"><label>重要照片</label><input id="photoInput" type="file" accept="image/*" multiple></div><div id="photoGrid" class="photo-grid"></div><button class="btn primary wide" style="margin-top:12px" onclick="saveSettings()">儲存設定</button></div><div class="card"><button class="btn ghost wide" onclick="exportData()">匯出備份</button></div></section>
</main><button id="fab" class="fab" onclick="openTransaction()">＋</button><nav class="nav"><button class="active" onclick="showPage('home',this)">🏠<br>首頁</button><button onclick="showPage('finance',this)">💰<br>財務</button><button onclick="showPage('ledger',this)">🧾<br>記帳</button><button onclick="showPage('journal',this)">📓<br>日記</button><button onclick="showPage('more',this)">⚙️<br>更多</button></nav>
<div id="debtModal" class="modal"><div class="sheet"><div class="sheet-head"><h3>負債</h3><button class="close" onclick="closeM('debtModal')">✕</button></div><input id="debtId" type="hidden"><div class="form2"><div class="field"><label>類型</label><select id="debtType"><option>信貸</option><option>房貸</option><option>車貸</option><option>信用卡卡費</option><option>民間借款</option><option>其他</option></select></div><div class="field"><label>名稱</label><input id="debtName"></div><div class="field"><label>剩餘金額</label><input id="debtAmount" type="number"></div><div class="field"><label>年利率 %</label><input id="debtRate" type="number" step="0.01"></div><div class="field"><label>剩餘期數</label><input id="debtTerms" type="number"></div><div class="field"><label>下期繳費日</label><input id="debtDue" type="date"></div></div><div class="muted" id="paymentPreview"></div><button class="btn primary wide" onclick="saveDebt()">儲存</button></div></div>
<div id="assetModal" class="modal"><div class="sheet"><div class="sheet-head"><h3>資產／卡費</h3><button class="close" onclick="closeM('assetModal')">✕</button></div><input id="assetId" type="hidden"><div class="field"><label>類型</label><select id="assetType"><option>銀行戶頭</option><option>現金</option><option>證券戶</option><option>電子錢包</option><option>信用卡卡費</option></select></div><div class="field"><label>名稱</label><input id="assetName"></div><div class="field"><label>金額</label><input id="assetAmount" type="number"></div><div class="field"><label>繳費日（信用卡卡費才需填）</label><input id="assetDue" type="date"></div><button class="btn primary wide" onclick="saveAsset()">儲存</button></div></div>
<div id="goalModal" class="modal"><div class="sheet"><div class="sheet-head"><h3>存錢目標</h3><button class="close" onclick="closeM('goalModal')">✕</button></div><input id="goalId" type="hidden"><div class="field"><label>名稱</label><input id="goalName"></div><div class="field"><label>目標金額</label><input id="goalTarget" type="number"></div><div class="field"><label>目前金額</label><input id="goalCurrent" type="number"></div><button class="btn primary wide" onclick="saveGoal()">儲存</button></div></div>
<div id="payModal" class="modal"><div class="sheet"><div class="sheet-head"><h3>繳費</h3><button class="close" onclick="closeM('payModal')">✕</button></div><input id="payDebtId" type="hidden"><div class="field"><label>繳費方式</label><select id="payMode" onchange="togglePartial()"><option value="full">完全繳費</option><option value="partial">部分繳費</option></select></div><div class="field"><label>扣款帳戶</label><select id="payAccount"></select></div><div class="field"><label>本次繳費金額</label><input id="payAmount" type="number"></div><div id="partialOptions" style="display:none"><div class="field"><label>剩餘費用處理</label><select id="partialMode"><option value="carry">剩餘費用延至下一個</option><option value="recalc">重新輸入未來每期應繳金額</option></select></div><div class="field"><label>未來每期應繳金額（選重新輸入時）</label><input id="newPayment" type="number"></div></div><button class="btn primary wide" onclick="applyPayment()">確認繳費</button></div></div>
<div id="transactionModal" class="modal"><div class="sheet"><div class="sheet-head"><h3>記一筆</h3><button class="close" onclick="closeM('transactionModal')">✕</button></div><input id="txId" type="hidden"><div class="form2"><div class="field"><label>類型</label><select id="txType"><option value="expense">支出</option><option value="income">收入</option></select></div><div class="field"><label>日期</label><input id="txDate" type="date"></div></div><div class="field"><label>分類</label><input id="txCategory" placeholder="餐飲、薪資、交通…"></div><div class="field"><label>金額</label><input id="txAmount" type="number"></div><div class="field"><label>同步帳戶</label><select id="txAccount"></select></div><div class="field"><label>備註</label><input id="txNote"></div><button class="btn primary wide" onclick="saveTransaction()">儲存</button></div></div>
<div id="urge" class="urge"><div class="urge-body"><h1>先停五分鐘</h1><p id="urgeReason">你已經努力很久了，先不要做決定。</p><div id="timer" class="timer">05:00</div><button class="btn wide line" onclick="openLine()">前往接渡有緣人</button><button class="btn wide" onclick="closeUrge()">我先離開賭博頁面</button></div></div>
<script>
const $=id=>document.getElementById(id),KEY='restart-v6-data';const D={startDate:new Date().toISOString().slice(0,10),reason:'',checkins:[],best:0,relapses:[],debts:[],assets:[],goals:[],transactions:[],journals:[],photos:[]};function data(){try{return {...D,...JSON.parse(localStorage.getItem(KEY)||'{}')}}catch{return structuredClone(D)}}function save(d){localStorage.setItem(KEY,JSON.stringify(d));render()}function money(n){return 'NT$ '+Math.round(Number(n||0)).toLocaleString('zh-TW')}function days(a,b=new Date()){return Math.max(0,Math.floor((new Date(b)-new Date(a))/86400000))}function addMonth(s){const d=new Date(s);d.setMonth(d.getMonth()+1);return d.toISOString().slice(0,10)}function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function showPage(id,btn){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));$(id).classList.add('active');document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));if(btn)btn.classList.add('active');$('fab').style.display=id==='ledger'?'block':'none';if(id==='analysis')renderAnalysis('finance')}
function currentStreak(d){let start=d.startDate;if(d.relapses.length)start=d.relapses[d.relapses.length-1].restartDate||start;return days(start)}function render(){const d=data(),st=currentStreak(d),assets=d.assets.filter(x=>x.type!=='信用卡卡費').reduce((a,x)=>a+Number(x.amount||0),0),cards=d.assets.filter(x=>x.type==='信用卡卡費').reduce((a,x)=>a+Number(x.amount||0),0),debts=d.debts.reduce((a,x)=>a+Number(x.amount||0),0)+cards;const goal=d.goals[0],gp=goal?Math.min(100,Math.round(goal.current/Math.max(1,goal.target)*100)):0;$('homeDebt').textContent=money(debts);$('homeAsset').textContent=money(assets);$('homeGoal').textContent=gp+'%';if($('dayCount'))$('dayCount').textContent=st;if($('streakCount'))$('streakCount').textContent=d.checkins.length;if($('savedTotal'))$('savedTotal').textContent=money(0);if($('homeHero')){const photo=d.photos&&d.photos[0];$('homeHero').classList.toggle('has-photo',!!photo);if(photo)$('homeHeroImg').src=photo}$('bestRecord').textContent=Math.max(d.best||0,st);const r=d.relapses.at(-1);$('relapseNote').style.display=r&&days(r.date)<2?'block':'none';$('checkinText').textContent=d.checkins.includes(new Date().toISOString().slice(0,10))?'今天已完成簽到':'點一下完成今天簽到';const stages=st<1?['🌰','種子正在等待發芽']:st<7?['🌱','嫩芽正在長出來']:st<30?['🌿','小苗正在變強']:st<100?['🌳','你已經長成小樹']:['🌲','大樹正在守護你的未來'];$('treeEmoji').textContent=stages[0];$('treeText').textContent=stages[1]+'・'+st+' 天';const ms=[1,7,30,100,200,365];$('milestones').innerHTML=ms.map(x=>`<div class="mile ${st>=x?'done':''}"><i></i>${x}天</div>`).join('');renderUpcomingPayments(d);renderFinance(d,assets,debts);renderLedger();renderJournals();$('startDate').value=d.startDate;$('reasonText').value=d.reason;renderPhotos(d)}
function checkin(){const d=data(),today=new Date().toISOString().slice(0,10);if(!d.checkins.includes(today))d.checkins.push(today);d.best=Math.max(d.best||0,currentStreak(d));save(d)}function relapse(){if(!confirm('確定要記錄這次復賭嗎？系統會保留歷史最佳，明天重新開始。'))return;const d=data(),today=new Date().toISOString().slice(0,10);d.best=Math.max(d.best||0,currentStreak(d));const t=new Date();t.setDate(t.getDate()+1);d.relapses.push({date:today,restartDate:t.toISOString().slice(0,10)});save(d)}
function monthlyPayment(a,r,n){a=Number(a||0);n=Number(n||0);r=Number(r||0)/100/12;if(!n)return 0;if(!r)return a/n;return a*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1)}
function renderUpcomingPayments(d){
  const today=new Date();today.setHours(0,0,0,0);
  const rows=[];
  d.debts.forEach(x=>{
    if(!x.due||Number(x.amount||0)<=0)return;
    const due=new Date(x.due+'T00:00:00');
    const dd=Math.round((due-today)/86400000);
    const amount=Math.min(Number(x.amount||0),Number(x.payment||monthlyPayment(x.amount,x.rate,x.terms)||0));
    rows.push({name:x.name||x.type||'貸款',due:x.due,days:dd,amount,type:'貸款'});
  });
  d.assets.filter(x=>x.type==='信用卡卡費').forEach(x=>{
    if(!x.due||Number(x.amount||0)<=0)return;
    const due=new Date(x.due+'T00:00:00');
    const dd=Math.round((due-today)/86400000);
    rows.push({name:x.name||'信用卡卡費',due:x.due,days:dd,amount:Number(x.amount||0),type:'信用卡'});
  });
  rows.sort((a,b)=>a.days-b.days);
  const visible=rows.filter(x=>x.days<=30).slice(0,8);
  const box=$('upcomingPayments');
  if(!box)return;
  if(!visible.length){box.innerHTML='<div class="empty">未來 30 天沒有已登記的繳款</div>';return;}
  box.innerHTML=visible.map(x=>{
    const cls=x.days<0?'urgent':x.days<=3?'urgent':x.days<=7?'soon':'';
    const label=x.days<0?`已逾期 ${Math.abs(x.days)} 天`:x.days===0?'今天到期':x.days===1?'明天到期':`${x.days} 天後`;
    return `<div class="upcoming-item ${cls}"><div><div class="name">${esc(x.name)}</div><div class="date">${x.type}・繳款日 ${x.due}</div></div><div><div class="amount">${money(x.amount)}</div><div class="days">${label}</div></div></div>`;
  }).join('');
}
